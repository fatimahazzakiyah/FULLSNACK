<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang Belanja - FullSnack</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      }
      h2 {
        color: #2c3e50;
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }
      th {
        color: #666;
        font-weight: 600;
      }

      /* Tombol Hapus Pink Senada */
      .btn-delete {
        background-color: #ff6b9d;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transition: 0.3s;
      }
      .btn-delete:hover {
        background-color: #e85a8b;
        transform: scale(1.05);
      }

      .total-section {
        margin-top: 30px;
        text-align: right;
        font-size: 22px;
        font-weight: bold;
        color: #2c3e50;
      }
      #grand-total {
        color: #ff6b9d;
      }

      .btn-checkout {
        background: #ff6b9d;
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        float: right;
        margin-top: 20px;
        transition: 0.3s;
      }
      .btn-checkout:hover {
        background: #e85a8b;
        box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
      }
      .back-link {
        text-decoration: none;
        color: #6c757d;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>🛒 Keranjang Belanja</h2>
      <a href="index.html" class="back-link">← Tambah snack lagi</a>

      <table>
        <thead>
          <tr>
            <th>Produk</th>
            <th>Harga</th>
            <th>Jumlah</th>
            <th>Subtotal</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="cart-items"></tbody>
      </table>

      <div class="total-section">Total: <span id="grand-total">Rp 0</span></div>

      <button onclick="checkout()" class="btn-checkout">
        Checkout Sekarang
      </button>
      <div style="clear: both"></div>
    </div>

    <script>
      // Fungsi untuk mengambil data keranjang dari backend
      async function loadCart() {
        try {
          const response = await fetch("http://localhost:3000/api/cart");
          const items = await response.json();

          const tbody = document.getElementById("cart-items");
          let totalBayar = 0;
          tbody.innerHTML = "";

          items.forEach((item) => {
            const subtotal = item.harga * item.quantity;
            totalBayar += subtotal;

            tbody.innerHTML += `
                        <tr>
                            <td>${item.nama_produk}</td>
                            <td>Rp ${item.harga.toLocaleString()}</td>
                            <td>${item.quantity}</td>
                            <td>Rp ${subtotal.toLocaleString()}</td>
                            <td>
                                <button class="btn-delete" onclick="removeItem(${item.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
          });

          document.getElementById("grand-total").innerText =
            `Rp ${totalBayar.toLocaleString()}`;
        } catch (error) {
          console.error("Gagal memuat keranjang:", error);
        }
      }

      // Fitur Hapus Item (Maulidya)
      async function removeItem(id) {
        if (confirm("Apakah Anda yakin ingin menghapus snack ini?")) {
          try {
            await fetch(`http://localhost:3000/api/cart/${id}`, {
              method: "DELETE",
            });
            loadCart(); // Reload tabel dan total harga
          } catch (error) {
            alert("Gagal menghapus item.");
          }
        }
      }

      // Fitur Checkout & Potong Stok (Tugas Arra)
      async function checkout() {
        if (
          confirm(
            "Konfirmasi Checkout? Stok di database akan otomatis berkurang.",
          )
        ) {
          try {
            const response = await fetch("http://localhost:3000/api/checkout", {
              method: "POST",
            });
            const result = await response.json();

            if (response.ok) {
              alert(result.message);
              loadCart(); // Grand Total otomatis jadi Rp 0 karena keranjang dikosongkan
            } else {
              alert(result.message);
            }
          } catch (error) {
            alert("Terjadi kesalahan pada server saat checkout.");
          }
        }
      }

      // Jalankan fungsi loadCart saat halaman dibuka
      loadCart();
    </script>
  </body>
</html>
