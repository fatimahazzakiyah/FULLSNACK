<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog FullSnack</title>

    <style>
        :root { 
            --primary: #ff6b9d; 
            --dark: #2c3e50; 
            --light: #fff0f5; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--light);
            margin: 0; 
            padding: 20px; 
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--primary); }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .card-title { font-weight: bold; }
        .card-price { color: var(--primary); }

        .btn-detail {
            display: block;
            text-align: center;
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Snack Katalog 🍿</h1>
        <p>Temukan camilan favoritmu!</p>
    </div>

    <div class="product-grid" id="katalog-list"></div>

    <script>
        const API_URL = 'http://localhost:3000/api/products';

        async function loadKatalog() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                const container = document.getElementById('katalog-list');

                container.innerHTML = '';

                result.data.forEach(p => {
    container.innerHTML += `
        <div class="card">
            <div class="card-img">No Image</div>
            <div class="card-body">
                <h3 class="card-title">${p.nama}</h3>
                <p class="card-price">Rp ${p.harga.toLocaleString()}</p>
                <a href="detail.html?id=${p.id_product}" class="btn-detail">Lihat Detail</a>
            </div>
        </div>
    `;
});
            } catch (error) {
                console.error(error);
            }
        }

        loadKatalog();
    </script>

</body>
</html>
