<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - FullSnack</title>

    <!-- Font biar lebih bagus -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .back-link {
            text-decoration: none;
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .product-title {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .price {
            color: #ff6b9d;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .info-label {
            font-weight: bold;
            color: #7f8c8d;
            margin-top: 20px;
        }

        .description {
            line-height: 1.6;
            color: #34495e;
            background: #fdfdfd;
            padding: 15px;
            border-left: 5px solid #ff6b9d;
        }

        .stock-tag {
            display: inline-block;
            background: #ff6b9d;
            color: #fdfdfd;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .button-group {
            display: flex;      /* Biar sejajar */
            gap: 10px;          /* Biar ada jarak antar tombol */
            margin-top: 20px;
        }

        .btn-cart, .btn-delete {
            flex: 1;             /* Biar lebar kiri & kanan sama rata */
            height: 45px;        /* Biar tingginya sama */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        
        /* Warna Pink buat Tambah */
        .btn-cart {
            background-color: #ff6b9d; 
        }

        .btn-cart:hover {
            background-color: #ff4a85;
        }

        /* Warna Merah buat Hapus */
        .btn-delete {
            background-color: #de2c85; 
        }

        .btn-delete:hover {
            background-color: #f6208b;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-link">← Kembali ke Katalog</a>

    <div id="loading">Memuat detail produk...</div>

    <div id="product-detail" style="display: none;">
        <h1 id="det-nama" class="product-title"></h1>
        <div id="det-stok" class="stock-tag"></div>
        <p id="det-harga" class="price"></p>

        <p class="info-label">Deskripsi Produk:</p>
        <div id="det-deskripsi" class="description"></div>

        <div class="button-group">
            <!-- TOMBOL TAMBAH KE KERANJANG -->
            <button onclick="addToCart()" class="btn-cart">
                Tambah ke Keranjang
            </button>

            <!-- TOMBOL HAPUS DARI KERANJANG -->
            <button onclick="deleteItem(productId)" class="btn-delete">
                Hapus dari Keranjang
            </button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    async function loadDetail() {
        if (!productId) {
            document.getElementById('loading').innerText = "Produk tidak ditemukan (ID kosong)";
            return;
        }

        try {
            const response = await fetch(`http://localhost:3000/api/products/${productId}`);
            const result = await response.json();

            if (response.status === 404) {
                document.getElementById('loading').innerText = "Produk tidak ditemukan";
                return;
            }

            const produk = result.data;

            document.getElementById('det-nama').innerText = produk.nama;
            document.getElementById('det-harga').innerText = `Rp ${produk.harga.toLocaleString()}`;
            document.getElementById('det-stok').innerText = `Stok: ${produk.stok}`;
            document.getElementById('det-deskripsi').innerText = produk.deskripsi || "Tidak ada deskripsi";

            document.getElementById('loading').style.display = 'none';
            document.getElementById('product-detail').style.display = 'block';

        } catch (error) {
            console.error(error);
            document.getElementById('loading').innerText = "Gagal mengambil data dari server";
        }
    }

    // FUNCTION ADD TO CART
    async function addToCart() {
        try {
            const response = await fetch('http://localhost:3000/api/cart', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id_product: productId
                })
            });

            const result = await response.json();

            if (!response.ok) {
                alert(result.message || "Gagal tambah ke keranjang");
                return;
            }

            alert("Produk berhasil ditambahkan ke keranjang!");
        } catch (error) {
            console.error(error);
            alert("Terjadi error saat menghubungi server");
        }
    }

    //FUNCTION DELETE ON CART
    async function deleteItem(id) {
    const isConfirmed = confirm("Apakah Anda yakin ingin menghapus item ini dari keranjang?");
    
    if (isConfirmed) {
        try {
            const response = await fetch(`http://localhost:3000/api/cart/${id}`, {
                method: 'DELETE'
            });
            
            const result = await response.json();
            alert(result.message);
            
            location.reload(); 
        } catch (error) {
            console.error("Gagal hapus:", error);
            alert("Terjadi kesalahan saat menghapus data.");
            }
        }
    }

    loadDetail();
</script>

</body>
</html>
